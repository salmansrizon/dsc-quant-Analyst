name: Daily LankaBD Scraper

on:
  schedule:
    # Run at 09:00 UTC (3:00 PM BD time) Sunday to Thursday
    - cron: '0 9 * * 0-4'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    
    env:
      # These must be set in GitHub Repository Secrets
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapers (Attempt 1)
        id: scrape_primary
        continue-on-error: true
        run: |
          echo "Starting daily scrape..."
          python dataGrid.py
          python announcement.py
          python priceArchive.py

      - name: Wait and Retry (Attempt 2)
        if: steps.scrape_primary.outcome == 'failure'
        run: |
          echo "Primary attempt failed. Waiting 1 hour (3600s) to retry..."
          sleep 3600
          echo "Retrying scrape..."
          python dataGrid.py
          python announcement.py
          python priceArchive.py
